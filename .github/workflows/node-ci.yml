name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test using Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        uses: ./.github/actions/yarn-nm-install

      - name: Lint library
        run: yarn lint

      - name: Prettier check
        run: yarn prettier:check

      - name: Test library
        run: yarn test

      - name: Typecheck library
        run: yarn typecheck

      - name: Build library
        run: yarn build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    permissions:
      id-token: write
    steps:
      - name: Get GitHub App Token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: scenes-repo-bot-access-token

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          persist-credentials: false

      - name: Prepare repository
        run: git fetch --unshallow --tags

      - name: Test using Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        uses: ./.github/actions/yarn-nm-install

      - name: Build library
        run: yarn run lerna run build --no-private

      - name: Run auto shipit
        run: yarn auto shipit
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
